<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CE1126"/>
      <stop offset="50%" stop-color="#FCD116"/>
      <stop offset="100%" stop-color="#006B3F"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#FCD116"/>
    </linearGradient>
  </defs>
  <!-- Background: Ghana flag gradient rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M256 90 L370 140 L370 270 Q370 370 256 430 Q142 370 142 270 L142 140 Z"
        fill="url(#shield)" stroke="#000" stroke-width="4" stroke-linejoin="round" opacity="0.95"/>
  <!-- OS text -->
  <text x="256" y="310" text-anchor="middle" font-family="Georgia, serif" font-weight="900" font-size="160" fill="#0f1117" letter-spacing="-8">
    OS
  </text>
</svg>
