appId: com.osbrowser.app
productName: OS Browser
directories:
  output: out
  buildResources: assets
files:
  - packages/main/dist/**/*
  - packages/preload/dist/**/*
  - packages/renderer/dist/**/*
  - packages/shared/dist/**/*
  - packages/shared/package.json
  - node_modules/@os-browser/**/*
  - node_modules/@ghostery/**/*
  - node_modules/cross-fetch/**/*
  - node_modules/node-fetch/**/*
  - assets/icon.*
  - assets/tray-icon.png
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.map"
  - "!**/*.md"
  - "!**/*.markdown"
  - "!**/README*"
  - "!**/CHANGELOG*"
  - "!**/HISTORY*"
  - "!**/LICENSE*"
  - "!**/LICENCE*"
  - "!**/.eslintrc*"
  - "!**/.prettierrc*"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/__tests__/**"
  - "!**/docs/**"
  - "!**/doc/**"
  - "!**/example/**"
  - "!**/examples/**"
  - "!**/.github/**"
  - "!**/.vscode/**"
  - "!**/coverage/**"
  - "!**/*.test.*"
  - "!**/*.spec.*"
  - "!**/*.d.ts.map"
  - "!**/.DS_Store"
  - "!**/tsconfig.json"
  - "!**/tsconfig.*.json"
  - "!**/.tsbuildinfo"
  - "!**/*.tsbuildinfo"
  - "!**/jest.config.*"
  - "!**/Makefile"
  - "!**/yarn.lock"
  - "!**/package-lock.json"
  - "!**/pnpm-lock.yaml"
asar: true
compression: maximum
electronLanguages:
  - en-US
  - en-GB
afterPack: ./scripts/afterPack.js
win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  protocols:
    - name: "OS Browser URL"
      schemes: ["http", "https"]
  fileAssociations:
    - ext: html
      name: "HTML Document"
      role: Viewer
    - ext: htm
      name: "HTM Document"
      role: Viewer
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OS Browser
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  runAfterFinish: true
  deleteAppDataOnUninstall: true
publish:
  provider: github
  owner: ghwmelite-dotcom
  repo: OS-Browser
