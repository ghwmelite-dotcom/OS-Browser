name = "os-browser-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" },
  { name = "USER_PRESENCE", class_name = "UserPresence" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom", "UserPresence"]

[vars]
ENVIRONMENT = "development"
APP_NAME = "OS Browser"
DEFAULT_MODEL = "@cf/meta/llama-3-8b-instruct"
MATRIX_HOMESERVER_URL = "https://matrix.org"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "aa3ee44d287a49ddbefa32447a66399a"

[[kv_namespaces]]
binding = "PAGE_CACHE"
id = "17dd1ea3f38a43708724394b3a47c879"

[[kv_namespaces]]
binding = "SESSIONS"
id = "8054c890dab648d3b001a6aa61aee658"

[[kv_namespaces]]
binding = "MESSAGES"
id = "410622ef993e4cab886b50f683f79602"

[[kv_namespaces]]
binding = "INVITE_CODES"
id = "751234b46ae744fd94af9c615dc3dd98"

# AI binding
[ai]
binding = "AI"
